<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Inicio de clases 2026 — 92.16</title>
  <style>
    :root{--accent:#375aeb;--muted:#6b7280;--bg:#0f172a}
    body{font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;margin:0;color:#0b1220;background:#fff}
    .container{max-width:860px;margin:2rem auto;padding:0 1rem}
    header{display:flex;align-items:center;justify-content:space-between;gap:1rem}
    .site-title{line-height:1}
    .site-title h1{margin:0;font-size:1.25rem}
    .site-title p{margin:0;color:var(--muted);font-size:0.95rem}
    nav a{color:var(--accent);text-decoration:none;margin-left:1rem;font-weight:600}

    .hero{display:flex;flex-direction:column;gap:0.5rem;background:linear-gradient(135deg,#fff8e1 0%,#fffde7 100%);border-radius:12px;padding:1.25rem;margin:1.5rem 0;border-left:4px solid #f9a825}
    .hero h2{margin:0;font-size:1.5rem}

    .card{background:#fff;border:1px solid #eef2ff;padding:1rem;border-radius:10px;margin-top:1rem}
    .muted{color:var(--muted)}
    .link{display:inline-block;margin-top:0.75rem;color:var(--accent);font-weight:600;text-decoration:none}

    .back-link{display:inline-block;color:var(--accent);text-decoration:none;font-weight:600;margin-bottom:0.5rem}
    .back-link:hover{text-decoration:underline}

    ol.links-list{padding-left:1.25rem;margin:0.5rem 0}
    ol.links-list li{margin:0.5rem 0;font-size:0.95rem}
    ol.links-list a{color:var(--accent);text-decoration:none}
    ol.links-list a:hover{text-decoration:underline}

    footer{margin-top:2rem;padding-top:1rem;border-top:1px solid #eee;color:var(--muted);font-size:0.9rem}
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="site-title">
        <h1 data-i18n="site_title"></h1>
        <p data-i18n="school_name"></p>
      </div>
      <nav>
        <a href="projects/index.html" data-i18n="nav_projects"></a>
        <a href="blog/index.html" data-i18n="nav_blog"></a>
        <a href="index.html#contact" data-i18n="nav_contact"></a>
        <a id="lang-toggle" href="?lang=en"></a>
      </nav>
    </header>

    <a href="index.html" class="back-link" data-i18n="anuncio_back" style="margin-top:1.5rem;display:inline-block"></a>

    <section class="hero">
      <h2 data-i18n="anuncio_title"></h2>
    </section>

    <div class="card">
      <p data-i18n-html="anuncio_intro" style="margin:0;line-height:1.7"></p>
    </div>

    <div class="card">
      <h3 data-i18n="anuncio_para_quien_title" style="margin-top:0"></h3>
      <p data-i18n="anuncio_para_quien" style="line-height:1.7;margin:0"></p>
    </div>

    <div class="card">
      <p data-i18n="anuncio_proyectos" style="line-height:1.7;margin:0"></p>
    </div>

    <div class="card" style="background:#f8f9ff;border-color:#dde4ff">
      <p data-i18n="anuncio_guarani" style="line-height:1.7;margin:0;font-size:0.95rem"></p>
    </div>

    <div class="card">
      <h3 data-i18n="anuncio_links_title" style="margin-top:0"></h3>
      <ol class="links-list">
        <li><a href="https://docs.google.com/presentation/d/1QGcf7Xus8HLGSLXLaO2M8IEK9-nPk7TvH2XmO0AaTc0/edit?usp=sharing" target="_blank" rel="noopener">Resumen de la materia</a></li>
        <li><a href="https://timmd-9216.github.io/?lang=es" target="_blank" rel="noopener">Web de la materia</a></li>
        <li><a href="https://campusgrado.fi.uba.ar/enrol/index.php?id=994" target="_blank" rel="noopener">Campus de la materia</a></li>
        <li><a href="https://meet.google.com/woa-cfne-fvy" target="_blank" rel="noopener">Meet de las clases</a></li>
        <li><a href="https://drive.google.com/file/d/1oXCYdV62Xe2bdA51pG4R60XuBOe_Z-9Z/view?fbclid=IwY2xjawMAyfVleHRuA2FlbQIxMABicmlkETFIRW01cm9ZRDlEd3d2V0N0AR5hCtC6CP4A2eNNw0879MeA73hdWZ2GzbE9l1SuNywKWkl4YOpW5MQdeDhvIA_aem_G_HBf4iz-ZbSxGlF0BSzBg" target="_blank" rel="noopener">Video demo de Trust</a></li>
        <li><a href="https://www.youtube.com/watch?v=Or-54q_-SGo" target="_blank" rel="noopener">Video demo de Crowdstream</a></li>
      </ol>
    </div>

    <div class="card" style="background:#f3f4ff;border-color:#c7d0ff">
      <p data-i18n-html="anuncio_cierre" style="line-height:1.7;margin:0"></p>
      <a href="https://meet.google.com/woa-cfne-fvy" target="_blank" rel="noopener" class="link">Unirse al Meet →</a>
    </div>

    <footer>
      <small data-i18n="footer_text"></small>
    </footer>
  </div>

  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var lang = params.get('lang')
        || localStorage.getItem('lang')
        || (navigator.language && navigator.language.startsWith('en') ? 'en' : 'es');

      if (lang !== 'en' && lang !== 'es') lang = 'es';
      localStorage.setItem('lang', lang);

      document.documentElement.lang = lang;

      fetch('translations.json')
        .then(function (r) { return r.json(); })
        .then(function (t) {
          var strings = t[lang];

          document.querySelectorAll('[data-i18n]').forEach(function (el) {
            var key = el.getAttribute('data-i18n');
            if (strings[key] !== undefined) el.textContent = strings[key];
          });

          document.querySelectorAll('[data-i18n-html]').forEach(function (el) {
            var key = el.getAttribute('data-i18n-html');
            if (strings[key] !== undefined) el.innerHTML = strings[key];
          });

          var toggle = document.getElementById('lang-toggle');
          toggle.href = strings['nav_language_href'];
          toggle.textContent = strings['nav_language'];

          document.title = strings['anuncio_page_title'];
        });
    })();
  </script>
</body>
</html>
